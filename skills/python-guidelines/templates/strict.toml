# ==============================================================================
# Python Project Configuration - STRICT TIER
# ==============================================================================
# For production services requiring high code quality and reliability.
# Tools: Ruff (comprehensive), mypy (strict + overrides), pytest (full)
# Based on: FastAPI, Pydantic production patterns
# ==============================================================================

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "my-service"
version = "1.0.0"
description = "Production service"
requires-python = ">=3.14"
dependencies = []

[project.optional-dependencies]
dev = [
    "ruff>=0.8.0",
    "mypy>=1.13.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
]

# ==============================================================================
# RUFF - Linter & Formatter (STRICT MODE)
# ==============================================================================
[tool.ruff]
target-version = "py314"
line-length = 88
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    "alembic/versions",
    ".archive",
]

[tool.ruff.lint]
# Strict rule set - comprehensive code quality
select = [
    "E",     # pycodestyle errors
    "F",     # Pyflakes
    "W",     # pycodestyle warnings
    "I",     # isort
    "B",     # flake8-bugbear (common bugs)
    "C4",    # flake8-comprehensions
    "UP",    # pyupgrade (modern syntax)
    "SIM",   # flake8-simplify
    "N",     # pep8-naming
    "RUF",   # Ruff-specific rules
    "PERF",  # Performance anti-patterns
    "PL",    # Pylint subset (PLW, PLC, PLE, PLR)
    "PTH",   # Use pathlib instead of os.path
    "T20",   # flake8-print (no print statements)
    "TRY",   # tryceratops (exception handling)
    "PIE",   # flake8-pie (misc lints)
    "RSE",   # flake8-raise
    "RET",   # flake8-return
    "FLY",   # flynt (use f-strings)
    "FURB",  # refurb (modernize code)
    "LOG",   # flake8-logging
    "G",     # flake8-logging-format
]

ignore = [
    "PLR0913",  # Too many arguments (FastAPI endpoints)
    "PLR2004",  # Magic value comparison (tests/configs)
    "PLR0911",  # Too many return statements
    "PLR0912",  # Too many branches
    "TRY003",   # Long exception messages (user-facing)
    "TRY300",   # Consider else block (style)
    "RET504",   # Unnecessary assignment before return
    "SIM108",   # Ternary operator
    "G004",     # Logging f-string (readable)
    "B008",     # Function call in default (FastAPI Depends)
]

[tool.ruff.lint.per-file-ignores]
# FastAPI patterns
"app/api/**/*.py" = ["B008"]  # Depends() in defaults
"app/main.py" = ["E402"]      # Import order for middleware

# Tests - relaxed rules
"tests/**/*.py" = [
    "N802", "N803", "N806",  # Naming conventions
    "B", "SIM",              # Bugbear, simplify
    "T20",                   # Print statements OK
    "PLR",                   # Pylint complexity
    "FURB157",               # Decimal("string") needed
]

# Alembic migrations
"alembic/**/*.py" = ["E501", "UP", "N999", "PLW"]

[tool.ruff.lint.isort]
known-first-party = ["app", "src"]
combine-as-imports = true

# ==============================================================================
# MYPY - Static Type Checker (STRICT MODE)
# ==============================================================================
[tool.mypy]
python_version = "3.14"
plugins = ["pydantic.mypy"]
strict = true
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
show_error_codes = true
show_column_numbers = true
ignore_missing_imports = true

exclude = [
    "venv",
    "\\.venv",
    "alembic/versions",
]

# Third-party without stubs
[[tool.mypy.overrides]]
module = [
    "uvicorn.*",
    "redis.*",
    "httpx.*",
    "aiohttp.*",
]
ignore_missing_imports = true

# Tests - relaxed
[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_calls = false
disallow_any_generics = false
warn_return_any = false
strict = false
check_untyped_defs = true

# Async-heavy modules
[[tool.mypy.overrides]]
module = [
    "app.services.*",
    "app.core.redis_client",
]
warn_unused_ignores = false
disallow_untyped_calls = false
warn_return_any = false

# ==============================================================================
# PYTEST - Testing Framework (FULL CONFIGURATION)
# ==============================================================================
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "-ra",
]
markers = [
    "unit: Unit tests (no external dependencies)",
    "integration: Integration tests (require database)",
    "e2e: End-to-end tests (require full environment)",
    "slow: Slow running tests",
    "asyncio: Async tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

# ==============================================================================
# COVERAGE - Test Coverage
# ==============================================================================
[tool.coverage.run]
source = ["app", "src"]
branch = true
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "*/venv/*",
    "*/.venv/*",
    "*/alembic/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "if typing.TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]
fail_under = 70
show_missing = true

[tool.coverage.html]
directory = "htmlcov"
