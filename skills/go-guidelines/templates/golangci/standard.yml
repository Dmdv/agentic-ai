# golangci-lint configuration - Standard Tier
# For: Team projects, production applications
# Copy to: .golangci.yml in project root

run:
  timeout: 5m
  go: "1.22"

linters:
  disable-all: true
  enable:
    # Core linters
    - errcheck      # Check that error return values are used
    - govet         # Reports suspicious constructs
    - staticcheck   # Static analysis checks
    - unused        # Checks for unused code

    # Code quality
    - gosimple      # Simplify code
    - ineffassign   # Detects ineffective assignments
    - typecheck     # Type checking

    # Formatting
    - gofmt         # Checks if code is gofmt-ed
    - goimports     # Check import statements

    # Style
    - misspell      # Finds commonly misspelled English words
    - unconvert     # Remove unnecessary type conversions

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - fieldalignment  # Can be noisy

  staticcheck:
    checks:
      - "all"

  goimports:
    # Put local imports after 3rd-party packages
    local-prefixes: github.com/yourorg

  misspell:
    locale: US

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

  exclude-rules:
    # Exclude some linters from running on tests
    - path: _test\.go
      linters:
        - errcheck
